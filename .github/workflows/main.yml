name: NTXA Auto Signer

on:
  workflow_dispatch:
    inputs:
      ipa_url:
        description: 'Direct IPA Link'
        required: true

jobs:
  sign:
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install zsign
        run: brew install zsign

      - name: Download and Sign
        run: |
          curl -L "${{ github.event.inputs.ipa_url }}" -o original.ipa
          zsign -k cert.p12 -p "${{ secrets.P12_PASSWORD }}" -m profile.mobileprovision -o signed_ntxa.ipa original.ipa

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: signed_ntxa.ipa
          tag_name: v${{ github.run_number }}
          name: "NTXA Signed Release #${{ github.run_number }}"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Get Direct Link
        run: |
          IPA_RAW="https://github.com/${{ github.repository }}/releases/download/v${{ github.run_number }}/signed_ntxa.ipa"
          PLIST_LINK="https://plist-service.vercel.app/plist?url=$IPA_RAW"
          echo "--------------------------------------------------"
          echo "رابط التثبيت المباشر (انسخه وافتحه في سفاري):"
          echo "itms-services://?action=download-manifest&url=$PLIST_LINK"
          echo "--------------------------------------------------"
